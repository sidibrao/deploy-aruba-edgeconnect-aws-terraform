---
AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions OIDC role for SD-WAN Terraform deployment

Parameters:
  GitHubOrganization:
    Type: String
    Description: GitHub organization or user that owns the deployment repository.
    Default: sidibrao

  RepositoryName:
    Type: String
    Description: GitHub repository allowed to assume this role.
    Default: deploy-aruba-edgeconnect-aws-treeaform

  BranchName:
    Type: String
    Description: Branch allowed to assume this role.
    Default: main

  RoleName:
    Type: String
    Description: IAM role name for GitHub Actions.
    Default: sdwan-terraform-github-actions

  UseExistingProvider:
    Type: String
    Description: Choose yes if token.actions.githubusercontent.com OIDC provider already exists in this AWS account.
    Default: "no"
    AllowedValues:
      - "yes"
      - "no"

  ManagedPolicyArn:
    Type: String
    Description: Managed policy attached to the GitHub Actions role. Tighten after validating the lab.
    Default: arn:aws:iam::aws:policy/AdministratorAccess

Conditions:
  CreateProvider: !Equals ["no", !Ref UseExistingProvider]

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
      Tags:
        - Key: Name
          Value: !Sub ${RoleName}-OIDC-Provider

  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: sts:AssumeRoleWithWebIdentity
            Principal:
              Federated: !If
                - CreateProvider
                - !Ref GitHubOidcProvider
                - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrganization}/${RepositoryName}:ref:refs/heads/${BranchName}
      ManagedPolicyArns:
        - !Ref ManagedPolicyArn
      Tags:
        - Key: Project
          Value: SD-WAN
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  RoleArn:
    Description: Set this as GitHub repository variable AWS_ROLE_ARN.
    Value: !GetAtt GitHubActionsRole.Arn

  TrustedSubject:
    Description: GitHub OIDC subject allowed by the role trust policy.
    Value: !Sub repo:${GitHubOrganization}/${RepositoryName}:ref:refs/heads/${BranchName}
