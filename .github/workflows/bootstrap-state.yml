name: Bootstrap Terraform State

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}

jobs:
  bootstrap-state:
    name: Create or update S3 backend prerequisites
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load deployment defaults
        id: deployment
        run: bash scripts/load-deployment-env.sh

      - name: Check required repository variables
        run: |
          test -n "${{ vars.AWS_ROLE_ARN }}" || (echo "Missing repository variable AWS_ROLE_ARN" && exit 1)

      - name: Configure AWS credentials
        uses: sidibrao/configure-aws-credentials-sid@main
        with:
          aws-region: ${{ vars.AWS_REGION || steps.deployment.outputs.aws_region }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: sdwan-bootstrap

      - name: Bootstrap state bucket
        run: bash scripts/bootstrap-state.sh "$TF_STATE_BUCKET" "$AWS_REGION" "$TF_STATE_KEY"

      - name: Verify caller
        run: aws sts get-caller-identity
